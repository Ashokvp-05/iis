services:
  # ---------------------------------------------------------------------------
  # 1. Backend Web Service (Express API)
  # ---------------------------------------------------------------------------
  - type: web
    name: hr-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: hr-database
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false # User will provide this in the dashboard

  # ---------------------------------------------------------------------------
  # 2. Frontend Web Service (Next.js)
  # ---------------------------------------------------------------------------
  - type: web
    name: hr-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false # User will provide this in the dashboard
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false # User will provide this in the dashboard
      - key: AUTH_TRUST_HOST
        value: true
      - key: NODE_OPTIONS
        value: --max-old-space-size=450

# ---------------------------------------------------------------------------
# 3. Managed PostgreSQL Database
# ---------------------------------------------------------------------------
databases:
  - name: hr-database
    plan: free
    region: singapore
