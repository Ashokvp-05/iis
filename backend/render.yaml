services:
  # Backend Web Service
  - type: web
    name: hr-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # You will provide this during deployment
      - key: JWT_SECRET
        sync: false # You will provide this during deployment
      - key: FRONTEND_URL
        fromService:
          type: web
          name: hr-frontend
          property: url

  # Frontend Web Service (Next.js)
  - type: web
    name: hr-frontend
    env: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: hr-backend
          property: url
          suffix: /api
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        fromService:
          type: web
          name: hr-frontend
          property: url
      - key: AUTH_TRUST_HOST
        value: true
